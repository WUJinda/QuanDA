# QuanDA electron-builder 配置
appId: com.quanda.app
productName: QuanDA
copyright: Copyright © 2024 QuanDA

# Electron 版本
electronVersion: 33.0.0

# 目录配置
directories:
  output: out
  buildResources: resources

# 压缩配置
compression: normal

# ASAR 打包配置
asar: false

# 跳过 npm install
npmRebuild: false

# 通用文件配置
files:
  - dist/**/*
  - package.json
  - 排除 workspace 包的 symlink
  - "!node_modules/@quanda/**"

# Windows 配置
win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64

# NSIS 安装程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
