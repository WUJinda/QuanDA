<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#gradient)"/>

  <!-- Chart bars -->
  <rect x="30" y="55" width="10" height="35" rx="2" fill="white" opacity="0.9"/>
  <rect x="45" y="45" width="10" height="45" rx="2" fill="white" opacity="0.9"/>
  <rect x="60" y="35" width="10" height="55" rx="2" fill="white"/>
  <rect x="75" y="48" width="10" height="42" rx="2" fill="white" opacity="0.9"/>
  <rect x="90" y="58" width="10" height="32" rx="2" fill="white" opacity="0.9"/>

  <!-- Trend line -->
  <polyline points="35,65 50,50 65,38 80,48 95,58" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data point -->
  <circle cx="65" cy="38" r="4" fill="#ffd700"/>
</svg>