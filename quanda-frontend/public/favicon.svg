<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Q主体渐变 -->
    <linearGradient id="qGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A7AEF"/>
      <stop offset="100%" style="stop-color:#7AA5FF"/>
    </linearGradient>

    <!-- 箭头渐变 -->
    <linearGradient id="arrowGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#FFB947"/>
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Q字母主体 -->
  <g filter="url(#shadow)">
    <!-- 外圆 -->
    <circle cx="88" cy="98" r="55" fill="none" stroke="url(#qGradient)" stroke-width="14"/>
    <!-- 横线 -->
    <line x1="33" y1="95" x2="88" y2="95" stroke="url(#qGradient)" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- 曲折上升的箭头尾巴 - 逐渐变粗，指向Q内部 -->
  <g filter="url(#shadow)">
    <!-- 箭头主体：使用填充路径实现逐渐变粗效果 -->
    <path fill="url(#arrowGradient)" d="
      M 170 160
      L 168 155
      Q 162 142, 152 135
      L 150 133
      Q 142 125, 138 112
      L 136 109
      Q 132 98, 118 88
      L 114 84
      Q 102 75, 92 65
      L 88 60
      L 68 70
      L 88 52
      L 96 60
      Q 108 70, 120 82
      L 124 87
      Q 136 96, 142 110
      L 144 115
      Q 150 128, 158 138
      L 162 144
      Q 168 154, 170 160
    "/>

    <!-- 箭头头部 -->
    <path fill="url(#arrowGradient)" d="M 88 60 L 64 70 L 88 48 Z"/>

    <!-- 数据点装饰 -->
    <circle cx="152" cy="135" r="2.5" fill="#FFB947" opacity="0.5"/>
    <circle cx="138" cy="112" r="3" fill="#FFB947" opacity="0.6"/>
    <circle cx="118" cy="88" r="3.5" fill="#FFB947" opacity="0.7"/>
  </g>

  <!-- 高光 -->
  <ellipse cx="60" cy="55" rx="10" ry="5" fill="#fff" opacity="0.12" transform="rotate(-40 60 55)"/>
</svg>
